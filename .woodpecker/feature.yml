steps:
  push-feature-build:
    image: woodpeckerci/plugin-docker-buildx:6.0.1
    settings:
      repo: ${CI_REPO_OWNER}/${CI_REPO_NAME}
      tags: ${CI_COMMIT_BRANCH/\//-}
      platforms: linux/amd64, linux/arm64
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
when:
  - event: push
    branch: [feature/*]
